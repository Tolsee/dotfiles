# improve colors
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",*:Tc"

# ergonomics
set -sg escape-time 0          # kill the ESC delay in nvim
set -g base-index 1            # windows start at 1
setw -g pane-base-index 1      # panes start at 1
set -g renumber-windows on     # keep window numbers gapless

# notification, alerting the states
# setw -g monitor-activity o
# Turn on mouse
set -g mouse on

# act like vim
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# create new pane or window in current directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display ".tmux.conf reloaded!"

# Kill session
bind Q confirm-before -p "kill-session #S? (y/n)" kill-session

# Hyperlinks
set -as terminal-features ',*:hyperlinks'

# Claude Code (runs inside tmux): let notifications/progress reach Ghostty,
# and let Shift+Enter insert a newline instead of submitting.
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Flag a window (e.g. Claude in another window) when it rings the bell.
# Claude's Notification hook emits a bell; sound comes from afplay, so silence
# the audible passthrough and just light up the window in the status bar.
set -g visual-bell on
setw -g monitor-bell on
set -g window-status-bell-style "fg=#ffc777,bold"

# Set window name to current dir basename. Can't use #{pane_current_path}:
# devin's shell wrapper freezes the pane process's cwd, so we walk to the real
# interactive shell underneath (see ~/bin/tmux-rename-cwd).
bind-key R   run-shell "~/bin/tmux-rename-cwd"
bind-key C-R run-shell "~/bin/tmux-rename-cwd"

# fuzzy repo jump (replaces static tmuxifier aliases)
bind-key -r f run-shell "tmux neww ~/bin/tmux-sessionizer"

# TokyoNight Moon statusline (matches nvim + Ghostty)
set -g status-position top
set -g status-justify left
set -g status-style "bg=#222436,fg=#c8d3f5"
set -g status-left "#[bg=#82aaff,fg=#1b1d2b,bold] #S #[bg=#222436,fg=#82aaff] "
set -g status-left-length 30
set -g status-right "#[fg=#636da6]#{?client_prefix,#[fg=#ffc777]PREFIX ,}#[fg=#636da6]%a %d %b #[fg=#82aaff]%H:%M "
set -g status-right-length 60
setw -g window-status-current-format "#[fg=#82aaff,bold]#I:#W "
setw -g window-status-format "#[fg=#636da6]#I:#W "
set -g pane-border-style "fg=#2f334d"
set -g pane-active-border-style "fg=#82aaff"
set -g message-style "bg=#82aaff,fg=#1b1d2b"

